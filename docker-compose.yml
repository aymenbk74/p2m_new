version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg16
    container_name: p2m_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-smart_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./products_table.sql:/docker-entrypoint-initdb.d/01-products.sql
      - ./custommer.sql:/docker-entrypoint-initdb.d/02-customers.sql
      - ./insertion.sql:/docker-entrypoint-initdb.d/03-insertion.sql
      - ./others.sql:/docker-entrypoint-initdb.d/04-others.sql
    networks:
      - p2m_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: p2m_backend
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-smart_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-me-in-production}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - p2m_network
    volumes:
      - ./server:/app
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: p2m_frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - p2m_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  p2m_network:
    driver: bridge
